# Quad — production-shaped full-stack compose (API + datastores + one-shot migrate).
# ----------------------------------------------------------------------------
# A single-host reference deployment that proves the "build → migrate → deploy → smoke" shape
# (DEPLOYMENT.md §7): the API image is built once, a one-shot `migrate` applies the additive
# migration history, then `api` starts only after the datastores are healthy AND migrate succeeded.
# Secrets are injected from the environment / a `.env` file (DEPLOY-INV-2) — copy `.env.prod.example`
# to `.env.prod` and set real values; never commit it.
#
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# ----------------------------------------------------------------------------
name: quad

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-quad}
    volumes:
      - quad_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quad} -d ${POSTGRES_DB:-quad}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8
    # Persist (appendonly) so cooldown/session keys survive a restart (COOL-INV-12 — not improperly evicted).
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - quad_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # One-shot: apply the additive migration history, then exit. The API waits for this to complete.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      QUAD_DYNAMIC_COOLDOWN: ${QUAD_DYNAMIC_COOLDOWN:-1}
      # Opt-in DEV knob: log the masked verification link token so sign-in works without a mail
      # provider. Leave 0 anywhere real; tokens in logs are a secret-hygiene risk.
      QUAD_LOG_MAIL_TOKEN: ${QUAD_LOG_MAIL_TOKEN:-0}
    # Loopback-only: reachable on the host for debugging, NOT off-host. Only the edge proxy is published
    # publicly — otherwise a direct caller could spoof X-Forwarded-For (with TRUST_PROXY=true) and bypass
    # the per-IP rate limit. To expose the API directly, pin TRUST_PROXY to the edge's IP/CIDR instead.
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: "3000"
    # The Next bundle ships with NEXT_PUBLIC_API_BASE='' (same-origin). The edge service below fronts
    # both apps on one origin and routes /api + /ws to `api` by tenant Host (DEPLOYMENT.md §9). WEB_PORT
    # remains a direct/debug surface; browser API calls on that port alone do not resolve.
    # Loopback-only (same rationale as the API): publish only the edge proxy off-host.
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Edge: one origin for the browser. Routes /api + /ws to `api` by tenant Host, everything else to
  # `web` — so the Next bundle's same-origin NEXT_PUBLIC_API_BASE='' resolves. This is the origin to
  # publish; `web`/`api` ports above are for direct/debug access.
  edge:
    image: caddy:2-alpine
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - quad_caddy:/data
    ports:
      - "${EDGE_PORT:-8088}:80"
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  quad_pg:
  quad_redis:
  quad_caddy:
