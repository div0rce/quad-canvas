name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# A configured Turbo remote cache is optional. When present, all parallel jobs share package build
# results; forked PRs with no token continue with Turbo's local cache.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Run before install/build so generated and ignored artifacts cannot pollute the scan.
      - name: Secret scan
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --no-git --source . --config .gitleaks.toml --redact --no-banner

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Fail cheap security/rollback checks before spending runner time on compilation.
      - name: Security audit
        run: pnpm audit --audit-level high

      - name: Migration safety
        run: pnpm check:migrations

      # Turbo schedules independent workspace checks in parallel while respecting package build
      # dependencies. The root ESLint invocation covers scripts/config outside workspaces.
      - name: Lint, typecheck, and unit tests
        run: |
          pnpm exec eslint scripts eslint.config.mjs
          pnpm exec turbo run lint typecheck test

      - name: Build
        run: pnpm build

      - name: Load gate
        run: pnpm load:gate

  integration:
    name: integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: quad
          POSTGRES_PASSWORD: quad
          POSTGRES_DB: quad
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quad -d quad" --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgresql://quad:quad@localhost:5432/quad
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm --filter @quad/db run db:migrate:deploy

      - name: Integration tests
        run: pnpm test:integration

  release_validation:
    name: production image validation and browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Build the production images once. The stack and browser test below use --no-build, ensuring
      # promotion validation exercises this exact image set rather than a second mutable rebuild.
      - name: Build production images
        run: |
          docker compose -f docker-compose.prod.yml --env-file .env.prod.example build
          api_size=$(docker image inspect quad-api:latest --format '{{.Size}}')
          migrate_size=$(docker image inspect quad-migrate:latest --format '{{.Size}}')
          web_size=$(docker image inspect quad-web:latest --format '{{.Size}}')
          test "$api_size" -le 1073741824
          test "$migrate_size" -le 1073741824
          test "$web_size" -le 536870912
          docker run --rm --entrypoint node quad-api:latest -e "require('node:fs').accessSync('dist/index.js'); if (require('./package.json').type !== 'module') process.exit(1)"
          docker run --rm --entrypoint node quad-migrate:latest -e "require('node:fs').accessSync('node_modules/prisma/build/index.js')"

      - name: Start production stack
        run: docker compose -f docker-compose.prod.yml --env-file .env.prod.example up -d --no-build --wait --wait-timeout 180

      - name: Seed browser fixture
        run: |
          docker compose -f docker-compose.prod.yml --env-file .env.prod.example exec -T postgres \
            psql -U quad -d quad -v ON_ERROR_STOP=1 \
            -c "INSERT INTO \"Tenant\"(id,slug,\"publicTitle\",status,\"updatedAt\") VALUES ('ten_rutgers','rutgers','Rutgers Quad','active',now()) ON CONFLICT (id) DO NOTHING;" \
            -c "INSERT INTO \"Canvas\"(id,\"tenantId\",\"termLabel\",status,width,height,\"updatedAt\") VALUES ('cv_e2e','ten_rutgers','F26','active',40,30,now()) ON CONFLICT (id) DO NOTHING;"

      - name: Production health
        run: |
          curl --fail --silent --show-error -H 'Host: rutgers.localhost' http://127.0.0.1:3000/healthz
          curl --fail --silent --show-error -H 'Host: rutgers.localhost' http://127.0.0.1:3000/readyz
          curl --fail --silent --show-error --resolve rutgers.localhost:8088:127.0.0.1 http://rutgers.localhost:8088/canvas >/dev/null

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install browser test dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: Browser E2E
        run: E2E_URL=http://rutgers.localhost:8088/canvas pnpm test:e2e

      - name: Runtime warning gate
        run: |
          if docker compose -f docker-compose.prod.yml --env-file .env.prod.example logs api web 2>&1 | grep -E 'MaxListenersExceededWarning|UnhandledPromiseRejection|Warning:'; then
            echo 'Runtime warning detected in production logs.' >&2
            exit 1
          fi

      - name: Production logs
        if: failure()
        run: docker compose -f docker-compose.prod.yml --env-file .env.prod.example logs --no-color

      - name: Stop production stack
        if: always()
        run: docker compose -f docker-compose.prod.yml --env-file .env.prod.example down -v

  # Preserve the existing required-check name while the implementation fans out for lower latency.
  verify:
    name: verify
    if: always()
    needs: [quality, integration, release_validation]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require every gate
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
          RELEASE_RESULT: ${{ needs.release_validation.result }}
        run: |
          test "$QUALITY_RESULT" = success
          test "$INTEGRATION_RESULT" = success
          test "$RELEASE_RESULT" = success
