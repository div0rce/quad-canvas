name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    # Real Postgres + Redis so the integration suite (placement, archive/replay, moderation, auth,
    # tenant isolation) gates every PR — not just unit tests. GitHub waits for service health first.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: quad
          POSTGRES_PASSWORD: quad
          POSTGRES_DB: quad
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quad -d quad" --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgresql://quad:quad@localhost:5432/quad
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Secret scan: fail the build if a credential is committed to the tree. Runs on the fresh
      # checkout BEFORE install/build, so there are no node_modules or .next artifacts to scan; the
      # documented example/dev files are allowlisted in .gitleaks.toml. Pinned gitleaks binary.
      - name: Secret scan
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --no-git --source . --config .gitleaks.toml --redact --no-banner

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Security gate: fail the build on a high/critical dependency advisory BEFORE running any
      # workspace scripts, so a vulnerable build/test-time dependency stops the job before it is
      # executed. Moderate/low are reported but don't block (currently 2 known moderates: a transitive
      # @hono/node-server in the Prisma CLI dev tree, and postcss via Next's build — both dev/build-time).
      - name: Security audit
        run: pnpm audit --audit-level high

      # Rollback-safety gate: forward migrations must be additive (no DROP/RENAME of tables or columns
      # the prior app reads, no destructive data ops) so an app rollback needs no DB rollback.
      - name: Migration safety
        run: pnpm check:migrations

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      # Apply the additive migration history to the CI Postgres, then run the integration suite
      # against real Postgres + Redis (the schema must exist before the tests TRUNCATE + seed).
      - name: Apply migrations
        run: pnpm --filter @quad/db run db:migrate:deploy

      - name: Integration tests
        run: pnpm test:integration

      # Load gate: drive the built API over real HTTP at fixed concurrency and fail on a throughput,
      # tail-latency, or error-rate regression. Thresholds carry large headroom over observed numbers
      # so they catch real regressions without flaking on shared runners.
      - name: Load gate
        run: pnpm load:gate
