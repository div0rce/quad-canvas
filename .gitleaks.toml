# Secret-scan config for the CI gate (see .github/workflows/ci.yml). Extends gitleaks' default rules
# and allowlists the documented example/local-dev files, which hold placeholders (e.g.
# "change-me-in-production") and local-only compose credentials, not real secrets.
[extend]
useDefault = true

[allowlist]
description = "Example/local-dev files contain documented placeholders, not real secrets."
paths = [
  '''\.env\.example$''',
  '''\.env\.prod\.example$''',
  '''docker-compose\.ya?ml$''',
  '''docker-compose\.prod\.ya?ml$''',
  '''\.github/workflows/ci\.yml$''',
]
regexes = [
  '''change-me-in-production''',
]
